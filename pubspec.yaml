name: mapcapture_rebuild
description: A Flutter map capture application for recording travel locations and routes.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Database
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3

  # Map
  amap_flutter_map: ^3.0.0
  amap_flutter_location: ^3.0.0

  # Permissions
  permission_handler: ^11.0.1

  # Image Handling
  image_picker: ^1.0.4

  # Utilities
  uuid: ^4.2.1
  intl: ^0.18.1

  # HTTP for API calls
  http: ^1.1.0

  # UI Components
  flutter_slidable: ^3.0.1

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sql/
